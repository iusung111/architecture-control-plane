name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: control_plane_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d control_plane_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      RUN_POSTGRES_INTEGRATION: '1'
      TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/control_plane_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: PostgreSQL integration tests
        run: pytest -q tests/test_postgres_integration.py

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose smoke embedded Python
        run: |
          python - <<'PY'
          from pathlib import Path

          script = Path("scripts/docker_compose_smoke.sh").read_text()
          marker = "python - <<'PY'\n"
          start = script.index(marker) + len(marker)
          end = script.index("\nPY\n", start)
          embedded = script[start:end]
          compile(embedded, "scripts/docker_compose_smoke.sh::<heredoc>", "exec")
          print("embedded smoke Python compiled successfully")
          PY

      - name: Run docker compose smoke test
        run: bash scripts/docker_compose_smoke.sh
