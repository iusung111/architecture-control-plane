name: Staging Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

jobs:
  staging-live-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate required secrets
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_MANAGEMENT_VIEWER_KEY: ${{ secrets.STAGING_MANAGEMENT_VIEWER_KEY }}
          STAGING_MANAGEMENT_OPERATOR_KEY: ${{ secrets.STAGING_MANAGEMENT_OPERATOR_KEY }}
          STAGING_MANAGEMENT_ADMIN_KEY: ${{ secrets.STAGING_MANAGEMENT_ADMIN_KEY }}
          STAGING_TRIGGER_BACKUP_DRILL_VIA_API: ${{ secrets.STAGING_TRIGGER_BACKUP_DRILL_VIA_API }}
          STAGING_VERIFY_ADMIN_WRITE: ${{ secrets.STAGING_VERIFY_ADMIN_WRITE }}
          STAGING_VERIFY_LIVE_ROUTING: ${{ secrets.STAGING_VERIFY_LIVE_ROUTING }}
          STAGING_DRILL_TARGET_NAME: ${{ secrets.STAGING_DRILL_TARGET_NAME }}
        run: |
          test -n "$STAGING_BASE_URL"
          test -n "$STAGING_MANAGEMENT_VIEWER_KEY"
          test -n "$STAGING_MANAGEMENT_OPERATOR_KEY"
          if [ "$STAGING_TRIGGER_BACKUP_DRILL_VIA_API" = "true" ] || [ "$STAGING_VERIFY_ADMIN_WRITE" = "true" ] || [ "$STAGING_VERIFY_LIVE_ROUTING" = "true" ]; then
            test -n "$STAGING_MANAGEMENT_ADMIN_KEY"
          fi
          if [ "$STAGING_TRIGGER_BACKUP_DRILL_VIA_API" = "true" ]; then
            test -n "$STAGING_DRILL_TARGET_NAME"
          fi

      - name: Resolve optional backup object storage settings
        run: |
          if [ -n "${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}" ]; then
            echo "BACKUP_ENCRYPTION_PASSPHRASE=${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_ACCOUNT_ID }}" ]; then
            echo "BACKUP_R2_ACCOUNT_ID=${{ secrets.BACKUP_R2_ACCOUNT_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_BUCKET }}" ]; then
            echo "BACKUP_R2_BUCKET=${{ secrets.BACKUP_R2_BUCKET }}" >> "$GITHUB_ENV"
            echo "BACKUP_OBJECT_STORE_VERIFY_RESTORE=true" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_PREFIX }}" ]; then
            echo "BACKUP_R2_PREFIX=${{ secrets.BACKUP_R2_PREFIX }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}" ]; then
            echo "BACKUP_R2_ACCESS_KEY_ID=${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}" ]; then
            echo "BACKUP_R2_SECRET_ACCESS_KEY=${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_SESSION_TOKEN }}" ]; then
            echo "BACKUP_R2_SESSION_TOKEN=${{ secrets.BACKUP_R2_SESSION_TOKEN }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_ENDPOINT_URL }}" ]; then
            echo "BACKUP_R2_ENDPOINT_URL=${{ secrets.BACKUP_R2_ENDPOINT_URL }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_REGION }}" ]; then
            echo "BACKUP_R2_REGION=${{ secrets.BACKUP_R2_REGION }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_FORCE_PATH_STYLE }}" ]; then
            echo "BACKUP_R2_FORCE_PATH_STYLE=${{ secrets.BACKUP_R2_FORCE_PATH_STYLE }}" >> "$GITHUB_ENV"
          fi

      - name: Run staging live smoke
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          STAGING_MANAGEMENT_VIEWER_KEY: ${{ secrets.STAGING_MANAGEMENT_VIEWER_KEY }}
          STAGING_MANAGEMENT_OPERATOR_KEY: ${{ secrets.STAGING_MANAGEMENT_OPERATOR_KEY }}
          STAGING_MANAGEMENT_ADMIN_KEY: ${{ secrets.STAGING_MANAGEMENT_ADMIN_KEY }}
          STAGING_USER_ID: ${{ secrets.STAGING_USER_ID }}
          STAGING_USER_ROLE: ${{ secrets.STAGING_USER_ROLE }}
          STAGING_TENANT_ID: ${{ secrets.STAGING_TENANT_ID }}
          STAGING_REFRESH_QUOTA_PROVIDERS: ${{ secrets.STAGING_REFRESH_QUOTA_PROVIDERS }}
          STAGING_VERIFY_ADMIN_WRITE: ${{ secrets.STAGING_VERIFY_ADMIN_WRITE }}
          STAGING_VERIFY_LIVE_ROUTING: ${{ secrets.STAGING_VERIFY_LIVE_ROUTING }}
          STAGING_LIVE_ROUTING_PROVIDER: ${{ secrets.STAGING_LIVE_ROUTING_PROVIDER }}
          STAGING_TRIGGER_BACKUP_DRILL_VIA_API: ${{ secrets.STAGING_TRIGGER_BACKUP_DRILL_VIA_API }}
          STAGING_EXPECT_OBJECT_STORE_UPLOAD: ${{ secrets.STAGING_EXPECT_OBJECT_STORE_UPLOAD }}
          STAGING_VERIFY_METRICS: ${{ secrets.STAGING_VERIFY_METRICS }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          STAGING_DRILL_DATABASE_URL: ${{ secrets.STAGING_DRILL_DATABASE_URL }}
          STAGING_DRILL_TARGET_NAME: ${{ secrets.STAGING_DRILL_TARGET_NAME }}
          STAGING_DRILL_OUTPUT_DIR: backups/staging-live-smoke
          STAGING_DRILL_LABEL: github-staging-live-smoke
          STAGING_DRILL_TIMEOUT_SECONDS: 1800
        run: |
          python scripts/staging_live_smoke.py

      - name: Upload staging smoke backup drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-live-smoke-${{ github.run_id }}
          path: backups/staging-live-smoke
          if-no-files-found: ignore
