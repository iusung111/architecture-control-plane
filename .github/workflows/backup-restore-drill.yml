name: Backup Restore Drill

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  weekly-drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: control_plane
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d control_plane"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/control_plane
      DRILL_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/control_plane_restore_drill
      BACKUP_OUTPUT_DIR: backups/drills
      BACKUP_RETENTION_KEEP_LAST: "4"
      BACKUP_RETENTION_MAX_AGE_DAYS: "30"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed minimal data
        run: |
          python - <<'PY'
          import psycopg
          with psycopg.connect("postgresql://postgres:postgres@localhost:5432/control_plane", autocommit=True) as conn:
              with conn.cursor() as cur:
                  cur.execute("select count(*) from alembic_version")
          PY

      - name: Resolve encryption passphrase
        run: |
          if [ -n "${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}" ]; then
            echo "BACKUP_ENCRYPTION_PASSPHRASE=${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}" >> "$GITHUB_ENV"
          else
            echo "BACKUP_ENCRYPTION_PASSPHRASE=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          fi

      - name: Resolve object storage settings
        run: |
          if [ -n "${{ secrets.BACKUP_R2_ACCOUNT_ID }}" ]; then
            echo "BACKUP_R2_ACCOUNT_ID=${{ secrets.BACKUP_R2_ACCOUNT_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_BUCKET }}" ]; then
            echo "BACKUP_R2_BUCKET=${{ secrets.BACKUP_R2_BUCKET }}" >> "$GITHUB_ENV"
            echo "BACKUP_OBJECT_STORE_VERIFY_RESTORE=true" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_PREFIX }}" ]; then
            echo "BACKUP_R2_PREFIX=${{ secrets.BACKUP_R2_PREFIX }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}" ]; then
            echo "BACKUP_R2_ACCESS_KEY_ID=${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}" ]; then
            echo "BACKUP_R2_SECRET_ACCESS_KEY=${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_SESSION_TOKEN }}" ]; then
            echo "BACKUP_R2_SESSION_TOKEN=${{ secrets.BACKUP_R2_SESSION_TOKEN }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_ENDPOINT_URL }}" ]; then
            echo "BACKUP_R2_ENDPOINT_URL=${{ secrets.BACKUP_R2_ENDPOINT_URL }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_REGION }}" ]; then
            echo "BACKUP_R2_REGION=${{ secrets.BACKUP_R2_REGION }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_R2_FORCE_PATH_STYLE }}" ]; then
            echo "BACKUP_R2_FORCE_PATH_STYLE=${{ secrets.BACKUP_R2_FORCE_PATH_STYLE }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_BUCKET }}" ]; then
            echo "BACKUP_S3_BUCKET=${{ secrets.BACKUP_S3_BUCKET }}" >> "$GITHUB_ENV"
            echo "BACKUP_OBJECT_STORE_VERIFY_RESTORE=true" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_PREFIX }}" ]; then
            echo "BACKUP_S3_PREFIX=${{ secrets.BACKUP_S3_PREFIX }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_ENDPOINT_URL }}" ]; then
            echo "BACKUP_S3_ENDPOINT_URL=${{ secrets.BACKUP_S3_ENDPOINT_URL }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_REGION }}" ]; then
            echo "BACKUP_S3_REGION=${{ secrets.BACKUP_S3_REGION }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}" ]; then
            echo "BACKUP_S3_ACCESS_KEY_ID=${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}" ]; then
            echo "BACKUP_S3_SECRET_ACCESS_KEY=${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_SESSION_TOKEN }}" ]; then
            echo "BACKUP_S3_SESSION_TOKEN=${{ secrets.BACKUP_S3_SESSION_TOKEN }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ secrets.BACKUP_S3_FORCE_PATH_STYLE }}" ]; then
            echo "BACKUP_S3_FORCE_PATH_STYLE=${{ secrets.BACKUP_S3_FORCE_PATH_STYLE }}" >> "$GITHUB_ENV"
          fi

      - name: Render object storage lifecycle policy
        run: |
          python scripts/render_s3_lifecycle_policy.py

      - name: Run backup restore drill
        run: |
          python scripts/postgres_backup_restore.py drill --label github-scheduled

      - name: Upload drill artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backup-restore-drill-${{ github.run_id }}
          path: backups/drills
          if-no-files-found: error
