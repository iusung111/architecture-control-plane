name: Remote Workspace Executor
run-name: ACP remote workspace ${{ inputs.execution_id }} · ${{ inputs.execution_kind }}

on:
  workflow_dispatch:
    inputs:
      execution_id:
        description: ACP execution identifier
        required: true
        type: string
      workspace_id:
        description: ACP workspace identifier
        required: true
        type: string
      execution_kind:
        description: Execution kind (prepare/run_checks/apply_patch_and_test)
        required: true
        type: string
      command:
        description: Command to execute remotely
        required: false
        type: string
      repo_url:
        description: Git repository URL
        required: false
        type: string
      repo_branch:
        description: Git branch to checkout
        required: false
        type: string
      repo_ref:
        description: Git ref override
        required: false
        type: string
      patch:
        description: Unified diff to apply before running the command
        required: false
        type: string
      callback_url:
        description: ACP callback URL
        required: false
        type: string
      metadata_json:
        description: Serialized ACP metadata
        required: false
        type: string

jobs:
  remote-workspace:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      TARGET_REPO_DIR: ${{ github.workspace }}/remote-target
    steps:
      - name: Checkout control-plane repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve target repository
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.repo_url }}" ]; then
            git clone --depth 1 "${{ inputs.repo_url }}" "$TARGET_REPO_DIR"
            cd "$TARGET_REPO_DIR"
            if [ -n "${{ inputs.repo_branch }}" ]; then
              git fetch --depth 1 origin "${{ inputs.repo_branch }}"
              git checkout "${{ inputs.repo_branch }}"
            fi
            if [ -n "${{ inputs.repo_ref }}" ]; then
              git fetch --depth 1 origin "${{ inputs.repo_ref }}"
              git checkout FETCH_HEAD
            fi
          else
            mkdir -p "$TARGET_REPO_DIR"
            rsync -a --delete --exclude '.git' "$GITHUB_WORKSPACE/" "$TARGET_REPO_DIR/"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies when available
        shell: bash
        run: |
          set -euo pipefail
          cd "$TARGET_REPO_DIR"
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e .[dev] || pip install -e . || true
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi

      - name: Apply incoming patch
        if: ${{ inputs.patch != '' }}
        shell: bash
        run: |
          set -euo pipefail
          cd "$TARGET_REPO_DIR"
          printf '%s' '${{ inputs.patch }}' > /tmp/remote-workspace.patch
          git apply --whitespace=nowarn /tmp/remote-workspace.patch

      - name: Execute requested command
        id: execute
        shell: bash
        env:
          ACP_EXECUTION_KIND: ${{ inputs.execution_kind }}
        run: |
          set +e
          cd "$TARGET_REPO_DIR"
          COMMAND="${{ inputs.command }}"
          if [ -z "$COMMAND" ]; then
            if [ "$ACP_EXECUTION_KIND" = "prepare" ]; then
              COMMAND="python -m compileall ."
            elif [ -f pyproject.toml ] || [ -f pytest.ini ] || [ -d tests ]; then
              COMMAND="pytest -q"
            else
              COMMAND="git status --short"
            fi
          fi
          echo "Running: $COMMAND"
          bash -lc "$COMMAND" | tee remote-workspace.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload remote workspace artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remote-workspace-${{ inputs.execution_id }}
          path: |
            ${{ env.TARGET_REPO_DIR }}/remote-workspace.log
          if-no-files-found: warn

      - name: Callback ACP
        if: ${{ inputs.callback_url != '' }}
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_TOKEN: ${{ secrets.REMOTE_WORKSPACE_CALLBACK_TOKEN }}
          EXECUTION_ID: ${{ inputs.execution_id }}
          WORKSPACE_ID: ${{ inputs.workspace_id }}
          EXECUTION_KIND: ${{ inputs.execution_kind }}
          EXIT_CODE: ${{ steps.execute.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ inputs.execution_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          callback_url = os.environ["CALLBACK_URL"].rstrip("/")
          execution_id = os.environ["EXECUTION_ID"]
          exit_code = int(os.environ.get("EXIT_CODE") or 0)
          run_url = os.environ["RUN_URL"]
          artifact_url = os.environ["ARTIFACT_URL"]
          payload = {
              "workspace_id": os.environ["WORKSPACE_ID"],
              "execution_kind": os.environ["EXECUTION_KIND"],
              "status": "succeeded" if exit_code == 0 else "failed",
              "result_summary": f"GitHub Actions exit code {exit_code}",
              "external_url": run_url,
              "logs_url": run_url,
              "exit_code": exit_code,
              "artifacts": [
                  {
                      "artifact_id": f"remote-workspace-log-{execution_id}",
                      "artifact_type": "workflow_log",
                      "uri": artifact_url,
                      "content_type": "text/plain",
                  }
              ],
              "metadata": {
                  "github_run_id": os.environ.get("GITHUB_RUN_ID"),
                  "github_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
                  "github_repository": os.environ.get("GITHUB_REPOSITORY"),
                  "github_run_url": run_url,
                  "github_artifact_url": artifact_url,
              },
          }
          req = urllib.request.Request(
              f"{callback_url}/executions/{execution_id}/result",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json",
                  "X-Remote-Workspace-Callback-Token": os.environ.get("CALLBACK_TOKEN", ""),
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=30) as response:
              print(response.read().decode("utf-8"))
          PY
