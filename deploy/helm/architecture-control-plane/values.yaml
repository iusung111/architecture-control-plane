image:
  repository: ghcr.io/example/architecture-control-plane
  tag: stable
  pullPolicy: IfNotPresent

replicaCount:
  api: 2
  workerJobs: 2
  workerOutbox: 1

service:
  port: 8000

serviceAccount:
  name: acp-runtime

remoteWorkspace:
  enabled: true
  persistentEnabled: false
  defaultExecutor: planning

secrets:
  create: false
  name: acp-secrets

config:
  name: acp-config

resources:
  api:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi
  workerJobs:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  workerOutbox:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
