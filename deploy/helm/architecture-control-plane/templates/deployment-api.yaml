apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels: { app: {{ include "acp.name" . }}, component: api }
  template:
    metadata:
      labels: { app: {{ include "acp.name" . }}, component: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | quote }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: {{ .Values.config.name }}
          env:
            - name: REMOTE_WORKSPACE_ENABLED
              value: {{ ternary "true" "false" .Values.remoteWorkspace.enabled | quote }}
            - name: REMOTE_WORKSPACE_PERSISTENT_ENABLED
              value: {{ ternary "true" "false" .Values.remoteWorkspace.persistentEnabled | quote }}
            - name: REMOTE_WORKSPACE_DEFAULT_EXECUTOR
              value: {{ .Values.remoteWorkspace.defaultExecutor | quote }}
            - name: DATABASE_URL_FILE
              value: /var/run/acp-secrets/DATABASE_URL
            - name: ABUSE_REDIS_URL_FILE
              value: /var/run/acp-secrets/ABUSE_REDIS_URL
            - name: AUTH_JWT_SECRET_FILE
              value: /var/run/acp-secrets/AUTH_JWT_SECRET
            - name: MANAGEMENT_API_KEYS_JSON_FILE
              value: /var/run/acp-secrets/MANAGEMENT_API_KEYS_JSON
          ports:
            - name: http
              containerPort: 8000
          resources:
{{ toYaml .Values.resources.api | indent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/acp-secrets
              readOnly: true
      volumes:
        - name: runtime-secrets
          secret:
            secretName: {{ .Values.secrets.name }}
