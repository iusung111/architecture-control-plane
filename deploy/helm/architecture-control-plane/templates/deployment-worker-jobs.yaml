apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "acp.fullname" . }}-worker-jobs
spec:
  replicas: {{ .Values.replicaCount.workerJobs }}
  selector:
    matchLabels: { app: {{ include "acp.name" . }}, component: worker-jobs }
  template:
    metadata:
      labels: { app: {{ include "acp.name" . }}, component: worker-jobs }
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | quote }}
      containers:
        - name: worker-jobs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Values.config.name }}
          env:
            - name: DATABASE_URL_FILE
              value: /var/run/acp-secrets/DATABASE_URL
          resources:
{{ toYaml .Values.resources.workerJobs | indent 12 }}
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/acp-secrets
              readOnly: true
      volumes:
        - name: runtime-secrets
          secret:
            secretName: {{ .Values.secrets.name }}
