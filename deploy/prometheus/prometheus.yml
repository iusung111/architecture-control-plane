global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts/acp-alerts.yml

scrape_configs:
  - job_name: acp-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: acp-worker-jobs
    static_configs:
      - targets: ["worker-jobs:9101"]

  - job_name: acp-worker-outbox
    static_configs:
      - targets: ["worker-outbox:9102"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
