groups:
- name: acp-slo-recording
  rules:
  - record: acp:slo_api_availability_bad_ratio5m
    expr: 'sum(rate(acp_slo_events_total{slo="api_availability",route_group!="system",outcome="bad"}[5m]))

      /

      clamp_min(sum(rate(acp_slo_events_total{slo="api_availability",route_group!="system"}[5m])),
      0.001)

      '
  - record: acp:slo_api_availability_bad_ratio1h
    expr: 'sum(rate(acp_slo_events_total{slo="api_availability",route_group!="system",outcome="bad"}[1h]))

      /

      clamp_min(sum(rate(acp_slo_events_total{slo="api_availability",route_group!="system"}[1h])),
      0.001)

      '
  - record: acp:slo_api_latency_bad_ratio5m
    expr: 'sum(rate(acp_slo_events_total{slo="api_latency",route_group!="system",outcome="bad"}[5m]))

      /

      clamp_min(sum(rate(acp_slo_events_total{slo="api_latency",route_group!="system"}[5m])),
      0.001)

      '
  - record: acp:slo_api_latency_bad_ratio1h
    expr: 'sum(rate(acp_slo_events_total{slo="api_latency",route_group!="system",outcome="bad"}[1h]))

      /

      clamp_min(sum(rate(acp_slo_events_total{slo="api_latency",route_group!="system"}[1h])),
      0.001)

      '
  - record: acp:slo_api_availability_burn_rate5m
    expr: acp:slo_api_availability_bad_ratio5m / 0.005
  - record: acp:slo_api_availability_burn_rate1h
    expr: acp:slo_api_availability_bad_ratio1h / 0.005
  - record: acp:slo_api_latency_burn_rate5m
    expr: acp:slo_api_latency_bad_ratio5m / 0.05
  - record: acp:slo_api_latency_burn_rate1h
    expr: acp:slo_api_latency_bad_ratio1h / 0.05
- name: acp-alerts
  rules:
  - alert: ACPApiAvailabilityErrorBudgetFastBurn
    expr: acp:slo_api_availability_burn_rate5m > 14.4
    for: 5m
    labels:
      severity: critical
      service: architecture-control-plane
      slo: api_availability
      team: ops
    annotations:
      summary: ACP API availability SLO is burning budget too quickly
      description: 5-minute API availability burn rate exceeds 14.4x the 99.5% objective.
      runbook_url: http://localhost:8000/runbooks/api-availability-fast-burn
      runbook_slug: api-availability-fast-burn
  - alert: ACPApiAvailabilityErrorBudgetSlowBurn
    expr: acp:slo_api_availability_burn_rate1h > 6
    for: 15m
    labels:
      severity: warning
      service: architecture-control-plane
      slo: api_availability
      team: ops
    annotations:
      summary: ACP API availability SLO is on a slow-burn path
      description: 1-hour API availability burn rate exceeds 6x the 99.5% objective.
      runbook_url: http://localhost:8000/runbooks/api-availability-slow-burn
      runbook_slug: api-availability-slow-burn
  - alert: ACPApiLatencyErrorBudgetFastBurn
    expr: acp:slo_api_latency_burn_rate5m > 14.4
    for: 5m
    labels:
      severity: critical
      service: architecture-control-plane
      slo: api_latency
      team: ops
    annotations:
      summary: ACP API latency SLO is burning budget too quickly
      description: 5-minute API latency burn rate exceeds 14.4x the 95% under-1s objective.
      runbook_url: http://localhost:8000/runbooks/api-latency-fast-burn
      runbook_slug: api-latency-fast-burn
  - alert: ACPApiLatencyErrorBudgetSlowBurn
    expr: acp:slo_api_latency_burn_rate1h > 6
    for: 15m
    labels:
      severity: warning
      service: architecture-control-plane
      slo: api_latency
      team: ops
    annotations:
      summary: ACP API latency SLO is on a slow-burn path
      description: 1-hour API latency burn rate exceeds 6x the 95% under-1s objective.
      runbook_url: http://localhost:8000/runbooks/api-latency-slow-burn
      runbook_slug: api-latency-slow-burn
  - alert: ACPWorkerDeadLettering
    expr: sum(rate(acp_job_executions_total{outcome="dead_lettered"}[5m])) > 0
    for: 5m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
      notify: email
    annotations:
      summary: ACP jobs are being dead-lettered
      description: At least one worker job has dead-lettered within the last 5 minutes.
      runbook_url: http://localhost:8000/runbooks/worker-dead-lettering
      runbook_slug: worker-dead-lettering
  - alert: ACPOutboxDeadLettering
    expr: sum(rate(acp_outbox_deliveries_total{outcome="dead_lettered"}[5m])) > 0
    for: 5m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
      notify: email
    annotations:
      summary: ACP outbox deliveries are being dead-lettered
      description: At least one outbox event has dead-lettered within the last 5 minutes.
      runbook_url: http://localhost:8000/runbooks/outbox-dead-lettering
      runbook_slug: outbox-dead-lettering
  - alert: ACPAuthFailuresSpike
    expr: sum(rate(acp_auth_failures_total[5m])) > 0.5
    for: 10m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
    annotations:
      summary: ACP auth failures are elevated
      description: Authentication failures have exceeded 0.5 requests/sec over the
        last 10 minutes.
      runbook_url: http://localhost:8000/runbooks/auth-failures-spike
      runbook_slug: auth-failures-spike
  - alert: ACPDbLockConflictsSpike
    expr: sum(rate(acp_db_lock_conflicts_total[5m])) > 0.1
    for: 10m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
    annotations:
      summary: ACP database lock conflicts are elevated
      description: Lock-conflict responses have exceeded 0.1/sec over the last 10
        minutes.
      runbook_url: http://localhost:8000/runbooks/db-lock-conflicts-spike
      runbook_slug: db-lock-conflicts-spike
  - alert: ACPRateLimitBackendUnhealthy
    expr: acp_rate_limit_backend_healthy{backend="redis"} == 0
    for: 5m
    labels:
      severity: critical
      service: architecture-control-plane
      team: ops
    annotations:
      summary: ACP shared rate limit backend is unhealthy
      description: Redis-backed rate limiting has been unhealthy for at least 5 minutes.
      runbook_url: http://localhost:8000/runbooks/rate-limit-backend-unhealthy
      runbook_slug: rate-limit-backend-unhealthy
  - alert: ACPRateLimitFailOpenBypass
    expr: sum(rate(acp_rate_limit_backend_decisions_total{decision="allow_on_backend_failure"}[5m]))
      > 0
    for: 5m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
      notify: email
    annotations:
      summary: ACP is bypassing rate limits due to backend failure
      description: Fail-open rate limit decisions have been observed during the last
        5 minutes.
      runbook_url: http://localhost:8000/runbooks/rate-limit-fail-open-bypass
      runbook_slug: rate-limit-fail-open-bypass
  - alert: ACPJobQueueBacklog
    expr: max(acp_job_oldest_ready_age_seconds) > 300
    for: 10m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
      notify: email
    annotations:
      summary: ACP job queue backlog is aging
      description: The oldest ready-to-run worker job has waited more than 5 minutes
        for at least 10 minutes.
      runbook_url: http://localhost:8000/runbooks/job-queue-backlog
      runbook_slug: job-queue-backlog
  - alert: ACPBackupDrillRunningTooLong
    expr: acp_job_oldest_running_age_seconds{job_type="backup_restore_drill"} > 1800
    for: 10m
    labels:
      severity: warning
      service: architecture-control-plane
      team: ops
      notify: email
    annotations:
      summary: ACP backup drill job is running too long
      description: A backup restore drill job has been claimed or running for more
        than 30 minutes.
      runbook_url: http://localhost:8000/runbooks/backup-drill-running-too-long
      runbook_slug: backup-drill-running-too-long
