apiVersion: apps/v1
kind: Deployment
metadata:
  name: acp-worker-outbox
  labels:
    app.kubernetes.io/component: worker-outbox
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: worker-outbox
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker-outbox
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: acp-runtime
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker-outbox
          image: ghcr.io/example/architecture-control-plane:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.workers.cli
            - outbox
            - --limit
            - "50"
            - --loop
            - --sleep-seconds
            - "2"
            - --metrics-port
            - "9102"
          ports:
            - name: metrics
              containerPort: 9102
          envFrom:
            - configMapRef:
                name: acp-config
          env:
            - name: DATABASE_URL_FILE
              value: /var/run/acp-secrets/DATABASE_URL
            - name: ABUSE_REDIS_URL_FILE
              value: /var/run/acp-secrets/ABUSE_REDIS_URL
            - name: AUTH_JWT_SECRET_FILE
              value: /var/run/acp-secrets/AUTH_JWT_SECRET
            - name: MANAGEMENT_API_KEYS_JSON_FILE
              value: /var/run/acp-secrets/MANAGEMENT_API_KEYS_JSON
            - name: NOTIFICATION_WEBHOOK_URL_FILE
              value: /var/run/acp-secrets/NOTIFICATION_WEBHOOK_URL
            - name: NOTIFICATION_WEBHOOK_SIGNING_SECRET_FILE
              value: /var/run/acp-secrets/NOTIFICATION_WEBHOOK_SIGNING_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/acp-secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: runtime-secrets
          secret:
            secretName: acp-secrets
