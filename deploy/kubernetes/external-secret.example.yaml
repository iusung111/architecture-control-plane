apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: acp-secrets
  labels:
    app.kubernetes.io/component: runtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-secrets
  target:
    name: acp-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: architecture-control-plane/database_url
    - secretKey: ABUSE_REDIS_URL
      remoteRef:
        key: architecture-control-plane/abuse_redis_url
    - secretKey: AUTH_JWT_SECRET
      remoteRef:
        key: architecture-control-plane/auth_jwt_secret
    - secretKey: MANAGEMENT_API_KEYS_JSON
      remoteRef:
        key: architecture-control-plane/management_api_keys_json
    - secretKey: MANAGEMENT_PROBE_KEY
      remoteRef:
        key: architecture-control-plane/management_probe_key
    - secretKey: NOTIFICATION_WEBHOOK_URL
      remoteRef:
        key: architecture-control-plane/notification_webhook_url
    - secretKey: NOTIFICATION_WEBHOOK_SIGNING_SECRET
      remoteRef:
        key: architecture-control-plane/notification_webhook_signing_secret
