apiVersion: v1
kind: Secret
metadata:
  name: acp-secrets
  labels:
    app.kubernetes.io/component: runtime
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://acp_user:replace-me@postgresql.example.internal:5432/control_plane
  ABUSE_REDIS_URL: redis://redis.example.internal:6379/0
  AUTH_JWT_SECRET: replace-with-a-long-random-shared-secret
  MANAGEMENT_API_KEYS_JSON: '{"replace-viewer-key":"viewer","replace-operator-key":"operator","replace-admin-key":"admin"}'
  MANAGEMENT_PROBE_KEY: replace-viewer-key
  NOTIFICATION_WEBHOOK_URL: https://notifications.example.internal/webhook
  NOTIFICATION_WEBHOOK_SIGNING_SECRET: replace-with-a-16-byte-minimum-secret
