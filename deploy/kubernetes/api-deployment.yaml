apiVersion: apps/v1
kind: Deployment
metadata:
  name: acp-api
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: acp-runtime
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/example/architecture-control-plane:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: acp-config
          env:
            - name: MANAGEMENT_PROBE_KEY
              valueFrom:
                secretKeyRef:
                  name: acp-secrets
                  key: MANAGEMENT_PROBE_KEY
            - name: DATABASE_URL_FILE
              value: /var/run/acp-secrets/DATABASE_URL
            - name: ABUSE_REDIS_URL_FILE
              value: /var/run/acp-secrets/ABUSE_REDIS_URL
            - name: AUTH_JWT_SECRET_FILE
              value: /var/run/acp-secrets/AUTH_JWT_SECRET
            - name: MANAGEMENT_API_KEYS_JSON_FILE
              value: /var/run/acp-secrets/MANAGEMENT_API_KEYS_JSON
            - name: NOTIFICATION_WEBHOOK_URL_FILE
              value: /var/run/acp-secrets/NOTIFICATION_WEBHOOK_URL
            - name: NOTIFICATION_WEBHOOK_SIGNING_SECRET_FILE
              value: /var/run/acp-secrets/NOTIFICATION_WEBHOOK_SIGNING_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          volumeMounts:
            - name: runtime-secrets
              mountPath: /var/run/acp-secrets
              readOnly: true
          startupProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import os
                  import urllib.request
                  req = urllib.request.Request(
                      "http://127.0.0.1:8000/readyz",
                      headers={"X-Management-Key": os.environ["MANAGEMENT_PROBE_KEY"]},
                  )
                  urllib.request.urlopen(req, timeout=5)
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import os
                  import urllib.request
                  req = urllib.request.Request(
                      "http://127.0.0.1:8000/readyz",
                      headers={"X-Management-Key": os.environ["MANAGEMENT_PROBE_KEY"]},
                  )
                  urllib.request.urlopen(req, timeout=5)
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: runtime-secrets
          secret:
            secretName: acp-secrets
