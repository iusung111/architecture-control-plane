apiVersion: v1
kind: ConfigMap
metadata:
  name: acp-config
  labels:
    app.kubernetes.io/component: runtime
data:
  APP_NAME: architecture-control-plane
  ENVIRONMENT: production
  LOG_LEVEL: INFO
  AUTH_MODE: bearer_jwt
  AUTH_HEADER_FALLBACK_ENABLED: "false"
  AUTH_JWT_ALLOWED_ALGORITHMS: HS256
  AUTH_JWT_ISSUER: architecture-control-plane
  AUTH_JWT_AUDIENCE: architecture-control-plane-api
  MANAGEMENT_ENDPOINTS_REQUIRE_API_KEY: "true"
  MANAGEMENT_RUNTIME_CACHE_TTL_SECONDS: "5"
  ABUSE_PROTECTION_ENABLED: "true"
  ABUSE_RATE_LIMIT_BACKEND: redis
  ABUSE_RATE_LIMIT_ALGORITHM: token_bucket
  ABUSE_RATE_LIMIT_BURST_MULTIPLIER: "1.5"
  ABUSE_RATE_LIMIT_BACKEND_FAILURE_MODE: open
  ABUSE_RATE_LIMIT_BACKEND_FAILURE_MODE_API: open
  ABUSE_RATE_LIMIT_BACKEND_FAILURE_MODE_MANAGEMENT: closed
  ABUSE_RATE_LIMIT_BACKEND_FAILURE_RETRY_AFTER_SECONDS: "5"
  METRICS_ENABLED: "true"
  WORKER_METRICS_ENABLED: "true"
  LLM_PROVIDER: disabled
  LLM_USAGE_MODE: free_only
  LLM_USAGE_COUNTER_BACKEND: auto
  BACKUP_COMMAND_TIMEOUT_SECONDS: "1800"
  OTEL_ENABLED: "false"
