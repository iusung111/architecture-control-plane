global:
  resolve_timeout: 5m
  smtp_from: architecture-control-plane-alerts@example.local
  smtp_smarthost: mailpit:1025
  smtp_require_tls: false
route:
  group_by:
  - alertname
  - service
  - severity
  group_wait: 15s
  group_interval: 1m
  repeat_interval: 4h
  receiver: webhook-sink
  routes:
  - receiver: email-default
    matchers:
    - severity="critical"
    continue: true
  - receiver: email-default
    matchers:
    - notify="email"
    continue: true
  - receiver: email-default
    matchers:
    - team="ops"
    continue: true
receivers:
- name: webhook-sink
  webhook_configs:
  - url: http://webhook-sink:8081/alertmanager
    send_resolved: true
- name: email-default
  email_configs:
  - to: team@example.com
    from: architecture-control-plane-alerts@example.local
    send_resolved: true
    headers:
      Subject: '[ACP][{{ .CommonLabels.severity | toUpper }}] {{ .CommonLabels.alertname
        }}'
    html: '<h3>{{ .CommonAnnotations.summary }}</h3>

      <p>{{ .CommonAnnotations.description }}</p>

      <p><strong>Runbook:</strong> <a href="{{ .CommonAnnotations.runbook_url }}">{{
      .CommonAnnotations.runbook_url }}</a></p>

      <p><strong>Status:</strong> {{ .Status }}</p>

      '
    text: 'Summary: {{ .CommonAnnotations.summary }}

      Description: {{ .CommonAnnotations.description }}

      Runbook: {{ .CommonAnnotations.runbook_url }}

      Status: {{ .Status }}

      '
inhibit_rules:
- source_matchers:
  - severity="critical"
  target_matchers:
  - severity="warning"
  equal:
  - alertname
  - service
