openapi: 3.1.0
info:
  title: Architecture Control Plane API
  version: 1.0.0
  description: Cloudflare Worker-native cycle orchestration scaffold.
servers:
  - url: /
paths:
  /healthz:
    get:
      summary: Liveness check
      responses: { "200": { description: OK } }
  /readyz:
    get:
      summary: Readiness check
      responses: { "200": { description: OK } }
  /v1/cycles:
    post:
      summary: Create a cycle
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCycleRequest"
      responses:
        "201":
          $ref: "#/components/responses/CycleEnvelope"
        "200":
          $ref: "#/components/responses/CycleEnvelope"
  /v1/cycles/{cycleId}:
    get:
      summary: Get a cycle summary
      parameters:
        - $ref: "#/components/parameters/CycleId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          $ref: "#/components/responses/CycleEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
  /v1/cycles/{cycleId}/result:
    get:
      summary: Get the finalized result
      parameters:
        - $ref: "#/components/parameters/CycleId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          $ref: "#/components/responses/ResultEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"
  /v1/cycles/{cycleId}/retry:
    post:
      summary: Retry a verification-failed cycle
      parameters:
        - $ref: "#/components/parameters/CycleId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetryRequest"
      responses:
        "202":
          $ref: "#/components/responses/ActionEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"
  /v1/cycles/{cycleId}/replan:
    post:
      summary: Replan a verification-failed cycle
      parameters:
        - $ref: "#/components/parameters/CycleId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplanRequest"
      responses:
        "202":
          $ref: "#/components/responses/ActionEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"
  /v1/approvals/pending:
    get:
      summary: List pending approvals for the caller role
      parameters:
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          $ref: "#/components/responses/PendingApprovalsEnvelope"
  /v1/approvals/{approvalId}/confirm:
    post:
      summary: Apply an approval decision
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
        - $ref: "#/components/parameters/UserId"
        - $ref: "#/components/parameters/UserRole"
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          $ref: "#/components/responses/ApprovalEnvelope"
        "403":
          $ref: "#/components/responses/ErrorEnvelope"
        "404":
          $ref: "#/components/responses/ErrorEnvelope"
        "409":
          $ref: "#/components/responses/ErrorEnvelope"
components:
  parameters:
    CycleId: { name: cycleId, in: path, required: true, schema: { type: string } }
    ApprovalId: { name: approvalId, in: path, required: true, schema: { type: string } }
    UserId: { name: X-User-Id, in: header, required: true, schema: { type: string } }
    UserRole: { name: X-User-Role, in: header, required: false, schema: { type: string, default: operator } }
    TenantId: { name: X-Tenant-Id, in: header, required: false, schema: { type: string } }
    RequestId: { name: X-Request-Id, in: header, required: false, schema: { type: string } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: false, schema: { type: string } }
  responses:
    CycleEnvelope: { description: Cycle summary, content: { application/json: { schema: { $ref: "#/components/schemas/CycleEnvelope" } } } }
    ResultEnvelope: { description: Final result, content: { application/json: { schema: { $ref: "#/components/schemas/ResultEnvelope" } } } }
    ActionEnvelope: { description: Accepted action, content: { application/json: { schema: { $ref: "#/components/schemas/ActionEnvelope" } } } }
    ApprovalEnvelope: { description: Approval decision, content: { application/json: { schema: { $ref: "#/components/schemas/ApprovalEnvelope" } } } }
    PendingApprovalsEnvelope: { description: Pending approvals, content: { application/json: { schema: { $ref: "#/components/schemas/PendingApprovalsEnvelope" } } } }
    ErrorEnvelope: { description: Error, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorEnvelope" } } } }
  schemas:
    CreateCycleRequest:
      type: object
      required: [project_id, user_input]
      properties:
        project_id: { type: string }
        user_input: { type: string }
        metadata:
          type: object
          properties:
            requires_approval: { type: boolean }
            required_role: { type: string }
            force_verification_failure: { type: boolean }
            final_output: { type: string }
    RetryRequest:
      type: object
      properties: { reason: { type: string } }
    ReplanRequest:
      type: object
      properties:
        reason: { type: string }
        override_input: { type: object, properties: { prompt: { type: string } } }
    ApprovalDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision: { type: string, enum: [approved, rejected] }
        comment: { type: string }
        reason_code: { type: string }
    ActiveApproval:
      type: object
      properties:
        approval_id: { type: string }
        approval_state: { type: string }
        required_role: { type: string }
        acted_at: { type: string, format: date-time, nullable: true }
    CycleSummary:
      type: object
      properties:
        cycle_id: { type: string }
        state: { type: string }
        user_status: { type: string }
        approval_required: { type: boolean }
        retry_allowed: { type: boolean }
        replan_allowed: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        active_approval: { $ref: "#/components/schemas/ActiveApproval" }
    CycleEnvelope:
      type: object
      properties: { data: { $ref: "#/components/schemas/CycleSummary" }, request_id: { type: string, nullable: true } }
    ResultEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            cycle_id: { type: string }
            final_state: { type: string }
            output: { type: string }
            updated_at: { type: string, format: date-time }
        request_id: { type: string, nullable: true }
    ActionEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            cycle_id: { type: string }
            action: { type: string }
            accepted: { type: boolean }
            state: { type: string }
            updated_at: { type: string, format: date-time }
        request_id: { type: string, nullable: true }
    ApprovalEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            approval_id: { type: string }
            approval_state: { type: string }
            cycle_id: { type: string }
            resume_enqueued: { type: boolean }
            acted_at: { type: string, format: date-time }
        request_id: { type: string, nullable: true }
    PendingApprovalsEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  approval_id: { type: string }
                  cycle_id: { type: string }
                  required_role: { type: string }
                  approval_state: { type: string }
                  created_at: { type: string, format: date-time }
            count: { type: integer }
        request_id: { type: string, nullable: true }
    ErrorEnvelope:
      type: object
      properties:
        error: { type: object, properties: { code: { type: string }, message: { type: string } } }
        request_id: { type: string, nullable: true }
